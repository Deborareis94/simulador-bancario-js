<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Conta Digital</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container">
    <h1>Simulador de Conta Digital</h1>
    <section>
         <h2>Criar Conta</h2>
         <input type="text" id="nome" placeholder ="Digite o nome">
         <button id="criarconta">Criar Conta</button>
         <p id="erroNome" style="color: red;"></p>
   </section>

   <section id="infoConta">
    <h2>Informações</h2>
    <p><strong>Titular: </strong><span id="titular"></span></p>
    <p><strong>Saldo: </strong>R$<span id="saldo">0.00</span></p>
       
</section>

<section id="operacoes">
    <h2>Operações</h2>
    <input type="number" id="valor" placeholder="Digite o valor">
    <button id="depositar"> Depositar</button>
    <button id="sacar">Sacar</button>

    <p id="mensagemErro"></p>

</section>



<section id="historicoConta">
    <h2>Histórico de transação</h2>
    <ul id="historico"></ul>
    </section>

    <script src="script.js"></script>

</div>
</body>
</html>
